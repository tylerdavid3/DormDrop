<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Complete Your Profile — DormDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#111827;--ink-3:#6B7280;--ink-4:#9CA3AF;--linen:#F9F7F4;--white:#FFFFFF;--rule:#E5E0D8;--teal:#0E6E6E;--teal-lt:#E6F4F4;--r:12px;--r-lg:20px;--sh-md:0 4px 16px rgba(0,0,0,.07)}
body{background:var(--linen);color:var(--ink);font-family:'Outfit',sans-serif;padding:88px 24px 48px;min-height:100vh}
.container{max-width:560px;margin:0 auto}
.sec-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px}
.sec-sub{font-size:14px;color:var(--ink-3);margin-bottom:24px}
.progress-wrap{background:var(--rule);height:6px;border-radius:100px;margin-bottom:32px;overflow:hidden}
#progress{height:100%;background:var(--teal);width:33%;transition:width .3s}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-4);margin-bottom:8px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--white);border:1px solid var(--rule);border-radius:9px;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:15px}
.fg textarea{min-height:90px;resize:vertical}
.btn-primary{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--white);background:var(--teal);border:none;padding:14px 28px;border-radius:var(--r);cursor:pointer;width:100%}
.btn-ghost{background:var(--white);border:1px solid var(--rule);color:var(--ink);padding:12px 20px;border-radius:var(--r);cursor:pointer;font-family:'Outfit',sans-serif}
.step{display:none}
#step-1{display:block}
.nav-mini{position:fixed;top:0;left:0;right:0;background:rgba(249,247,244,.95);border-bottom:1px solid var(--rule);padding:16px 24px;z-index:10}
.nav-mini a{color:var(--teal);text-decoration:none;font-weight:600;font-size:14px}
</style>
</head>
<body>
<div class="nav-mini"><a href="/">← DormDrop home</a></div>
<div class="container">
  <div class="progress-wrap"><div id="progress"></div></div>

  <div id="step-1" class="step">
    <h1 class="sec-title">Tell us about yourself</h1>
    <p class="sec-sub">Step 1 of 3 — academics &amp; photo</p>
    <form id="basic-info-form">
      <div class="fg"><label for="major">Major</label><input id="major" type="text" placeholder="e.g. Economics" required/></div>
      <div class="fg"><label for="bio">Bio</label><textarea id="bio" maxlength="500" placeholder="Short intro for roommates (optional)"></textarea></div>
      <div class="fg"><label for="profile-photo">Profile photo</label><input id="profile-photo" type="file" accept="image/*"/></div>
      <button type="submit" class="btn-primary">Next →</button>
    </form>
  </div>

  <div id="step-2" class="step">
    <h1 class="sec-title">Housing preferences</h1>
    <p class="sec-sub">Step 2 of 3</p>
    <form id="housing-prefs-form">
      <div class="fg">
        <label>Monthly budget (your share): <span id="budget-amount">1000</span>/month</label>
        <input id="budget" type="range" min="400" max="4000" value="1000" step="50"/>
      </div>
      <div class="fg"><label for="move-in-date">Preferred move-in</label><input id="move-in-date" type="date"/></div>
      <div class="fg"><label>Preferred neighborhoods</label><div id="neighborhoods-checkboxes"></div></div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="button" class="btn-ghost" onclick="prevStep()">← Back</button>
        <button type="submit" class="btn-primary" style="flex:1">Next →</button>
      </div>
    </form>
  </div>

  <div id="step-3" class="step">
    <h1 class="sec-title">Lifestyle</h1>
    <p class="sec-sub">Step 3 of 3 — helps us match compatible roommates</p>
    <form id="lifestyle-form">
      <div class="fg"><label for="sleep-schedule">Sleep schedule</label>
        <select id="sleep-schedule" required>
          <option value="">Select…</option>
          <option value="night-owl">Night owl</option>
          <option value="early-riser">Early riser</option>
          <option value="flexible">Flexible</option>
        </select>
      </div>
      <div class="fg"><label for="study-habits">Study habits</label>
        <select id="study-habits" required>
          <option value="">Select…</option>
          <option value="at-home">Mostly at home</option>
          <option value="on-campus">Mostly on campus</option>
          <option value="flexible">Flexible</option>
        </select>
      </div>
      <div class="fg"><label for="social-style">Social style</label>
        <select id="social-style" required>
          <option value="">Select…</option>
          <option value="very-social">Very social</option>
          <option value="somewhat-social">Somewhat social</option>
          <option value="introverted">Introverted</option>
          <option value="flexible">Flexible</option>
        </select>
      </div>
      <div class="fg"><label for="cleanliness">Cleanliness</label>
        <select id="cleanliness" required>
          <option value="">Select…</option>
          <option value="very-clean">Very clean</option>
          <option value="organized">Organized</option>
          <option value="relaxed">Relaxed</option>
          <option value="flexible">Flexible</option>
        </select>
      </div>
      <div class="fg"><label for="pets">Pets</label>
        <select id="pets" required>
          <option value="">Select…</option>
          <option value="love-pets">Love pets</option>
          <option value="ok-with-pets">OK with pets</option>
          <option value="no-pets">No pets</option>
        </select>
      </div>
      <div class="fg"><label for="guests">Guests</label>
        <select id="guests" required>
          <option value="">Select…</option>
          <option value="often">Often</option>
          <option value="sometimes">Sometimes</option>
          <option value="prefer-quiet">Prefer quiet</option>
        </select>
      </div>
      <div class="fg"><label for="smoking">Smoking</label>
        <select id="smoking" required>
          <option value="non-smoker">Non-smoker</option>
          <option value="smoker">Smoker</option>
          <option value="no-preference">No preference</option>
        </select>
      </div>
      <div class="fg"><label for="drinking">Drinking</label>
        <select id="drinking" required>
          <option value="no-preference">No preference</option>
          <option value="social">Social</option>
          <option value="non-drinker">Non-drinker</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="button" class="btn-ghost" onclick="prevStep()">← Back</button>
        <button type="submit" class="btn-primary" style="flex:1">Complete profile</button>
      </div>
    </form>
  </div>
</div>
<script type="module" src="/src/profile-setup.js"></script>
</body>
</html>
