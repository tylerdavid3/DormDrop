name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service-account.json

      - name: Detect Firebase project from service account
        run: |
          PROJECT_ID=$(python3 -c "import sys,json; print(json.load(open('/tmp/service-account.json'))['project_id'])")
          echo "FIREBASE_PROJECT=$PROJECT_ID" >> $GITHUB_ENV
          echo "Deploying to Firebase project: $PROJECT_ID"

      - name: Write functions .env
        run: echo "RENTCAST_API_KEY=${{ secrets.RENTCAST_API_KEY }}" > functions/.env

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --project "$FIREBASE_PROJECT" --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
