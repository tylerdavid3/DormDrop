name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write .env file
        run: echo "RENTCAST_API_KEY=${{ secrets.RENTCAST_API_KEY }}" > functions/.env

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service-account.json

      - name: Deploy Firebase Functions only
        run: npx firebase-tools deploy --only functions --project dormdrop-98dd3 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
