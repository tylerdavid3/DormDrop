name: Deploy Firebase Functions

on:
  # Run automatically on every push to main
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write .env file
        run: echo "RENTCAST_API_KEY=${{ secrets.RENTCAST_API_KEY }}" > functions/.env

      - name: Deploy Firebase Functions + Rules
        run: npx firebase-tools deploy --only functions,firestore:rules,storage --project dormdrop-98dd3 --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
