name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
    paths-ignore:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service-account.json

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project dormdrop-98dd3 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
