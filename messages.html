<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — DormDrop</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet"/>
<style>
body{margin:0;background:#F9F7F4;font-family:Outfit,sans-serif;padding:24px;min-height:100vh}
.wrap{max-width:720px;margin:0 auto}
h1{font-size:26px;margin-bottom:16px}
.row{display:grid;grid-template-columns:1fr 1.2fr;gap:16px}
@media(max-width:700px){.row{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid #E5E0D8;border-radius:12px;padding:16px;min-height:280px}
.conv{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:6px}
.conv:hover,.conv.active{background:#E6F4F4}
.msg{max-height:360px;overflow:auto;margin-bottom:12px}
.item{margin-bottom:10px;font-size:14px}
.item.me{text-align:right;color:#0E6E6E}
a{color:#0E6E6E}
input,button{font-family:inherit;padding:10px;border-radius:8px;border:1px solid #E5E0D8}
button{background:#0E6E6E;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <p><a href="/dashboard.html">← Dashboard</a></p>
  <h1>Messages</h1>
  <div class="row">
    <div class="panel" id="conv-list"><p style="color:#6B7280">Loading…</p></div>
    <div class="panel">
      <div id="thread" class="msg"></div>
      <div style="display:flex;gap:8px">
        <input id="msgIn" type="text" placeholder="Type a message…" style="flex:1"/>
        <button type="button" id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="/src/messages-page.js"></script>
</body>
</html>
