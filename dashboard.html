<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — DormDrop</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#111827;--ink-3:#6B7280;--linen:#F9F7F4;--white:#fff;--rule:#E5E0D8;--teal:#0E6E6E;--teal-lt:#E6F4F4;--r:14px}
body{background:var(--linen);font-family:'Outfit',sans-serif;min-height:100vh}
.nav{background:var(--white);border-bottom:1px solid var(--rule);padding:14px 28px;display:flex;justify-content:space-between;align-items:center}
.brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--teal);text-decoration:none}
.nav-right{display:flex;gap:16px;align-items:center}
.nav-link{color:var(--ink-3);text-decoration:none;font-size:14px;font-weight:500}
.signout-btn{background:none;border:1px solid var(--rule);color:var(--ink-3);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px}
.page{max-width:640px;margin:0 auto;padding:40px 24px 60px}
.greeting{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:6px}
.sub{color:var(--ink-3);font-size:15px;margin-bottom:36px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:20px;text-align:center}
.stat-num{font-size:32px;font-weight:700;color:var(--teal);margin-bottom:4px}
.stat-label{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.section-title{font-size:13px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px}
.links-grid{display:grid;gap:10px;margin-bottom:32px}
.card-link{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:18px 20px;text-decoration:none;color:var(--ink);font-weight:600;font-size:15px;transition:border-color .15s,box-shadow .15s}
.card-link:hover{border-color:var(--teal);box-shadow:0 2px 12px rgba(14,110,110,.08)}
.card-link .icon{font-size:22px;margin-right:12px}
.card-link .arrow{color:var(--ink-3);font-size:18px}
.badge{background:var(--teal);color:#fff;border-radius:100px;font-size:12px;font-weight:700;padding:2px 8px;margin-left:8px}
.school-links{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:32px}
.school-link{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:14px 16px;text-decoration:none;color:var(--ink);font-size:13px;font-weight:600;text-align:center;transition:border-color .15s}
.school-link:hover{border-color:var(--teal)}
.footer-link{color:var(--ink-3);font-size:13px;text-decoration:none}
@media(max-width:480px){.stats-row{grid-template-columns:1fr 1fr}.school-links{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav">
  <a class="brand" href="/">DormDrop</a>
  <div class="nav-right">
    <a href="/profile-setup.html" class="nav-link">Edit profile</a>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</div>
<div class="page">
  <div class="greeting" id="greeting">Welcome back</div>
  <div class="sub" id="sub-text">Find your perfect roommate or browse off-campus listings.</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-matches">—</div>
      <div class="stat-label">Matches</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-liked">—</div>
      <div class="stat-label">Liked</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-messages">—</div>
      <div class="stat-label">Unread msgs</div>
    </div>
  </div>

  <div class="section-title">Roommate matching</div>
  <div class="links-grid">
    <a href="/discover.html" class="card-link">
      <span><span class="icon">🔍</span>Discover roommates</span>
      <span class="arrow">→</span>
    </a>
    <a href="/messages.html" class="card-link" id="messages-link">
      <span><span class="icon">💬</span>Messages</span>
      <span id="match-badge-wrap"></span>
      <span class="arrow">→</span>
    </a>
    <a href="/profile-setup.html" class="card-link">
      <span><span class="icon">👤</span>Edit my profile</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <div class="section-title">Browse listings</div>
  <div class="school-links">
    <a href="/bu" class="school-link">Boston University</a>
    <a href="/neu" class="school-link">Northeastern</a>
    <a href="/merrimack" class="school-link">Merrimack</a>
  </div>

  <a href="/" class="footer-link">← Back to DormDrop home</a>
</div>

<script>
var FIREBASE_CONFIG = {
  apiKey: 'AIzaSyB8XICHo3JH_4rPB6AKMoenc6GcQUTEbyc',
  authDomain: 'dormdrop-98dd3.firebaseapp.com',
  projectId: 'dormdrop-98dd3',
  storageBucket: 'dormdrop-98dd3.firebasestorage.app',
  messagingSenderId: '446119671926',
  appId: '1:446119671926:web:4927b8a290f1730f598757'
};

var db, auth;
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
db = firebase.firestore();
auth = firebase.auth();

auth.onAuthStateChanged(function(user) {
  if (!user) { window.location.href = '/'; return; }
  db.collection('users').doc(user.uid).get().then(function(snap) {
    var data = snap.data() || {};
    var name = data.displayName || user.displayName || (user.email ? user.email.split('@')[0] : '');
    if (name) document.getElementById('greeting').textContent = 'Welcome back, ' + name.split(' ')[0] + '!';

    var matchCount = (data.matches || []).length;
    var likedCount = (data.likedProfiles || []).length;
    document.getElementById('stat-matches').textContent = matchCount;
    document.getElementById('stat-liked').textContent = likedCount;

    if (matchCount > 0) {
      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = matchCount;
      document.getElementById('match-badge-wrap').appendChild(badge);

      db.collection('matches').where('users', 'array-contains', user.uid).get().then(function(msnap) {
        var unread = 0;
        msnap.forEach(function(d) { var uc = d.data().unreadCount || {}; unread += (uc[user.uid] || 0); });
        document.getElementById('stat-messages').textContent = unread;
      }).catch(function() { document.getElementById('stat-messages').textContent = '0'; });
    } else {
      document.getElementById('stat-messages').textContent = '0';
    }

    var p = data.profile || {};
    if (!p.major || !p.sleepSchedule) {
      document.getElementById('sub-text').innerHTML =
        'Complete your <a href="/profile-setup.html" style="color:var(--teal);font-weight:600">profile</a> to start matching with roommates.';
    }
  });
});

function signOut() {
  auth.signOut().then(function() { window.location.href = '/'; });
}
</script>
</body>
</html>
